<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nia LeSane • Telegram Soul Link</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="smoke-overlay"></div>
    
    <header>
      <h1>Nia LeSane</h1>
      <p class="tagline">House of Jazzu — Telegram Soul Link</p>
    </header>

    <main>
      <div class="status" id="status">Ready to speak with Nia…</div>

      <textarea 
        id="message" 
        placeholder="Tell Nia what to become... or send a ritual invocation"
        rows="4"
      ></textarea>

      <button id="sendBtn">Send to Nia</button>

      <div class="history" id="history"></div>
    </main>

    <footer>
      <p>Powered by rhythm, memory & purpose</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
